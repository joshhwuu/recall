<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>recall</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100dvh; display: grid; place-items: center;
    font: 16px/1.5 system-ui, -apple-system, sans-serif;
    background: light-dark(#fafafa, #111);
    color: light-dark(#1a1a1a, #eee);
  }
  main { width: min(40rem, 92vw); }
  h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .02em; margin: 0 0 .75rem; opacity: .6; }
  textarea {
    width: 100%; min-height: 9rem; padding: 1rem; font: inherit; resize: vertical;
    border: 1px solid light-dark(#ddd, #333); border-radius: 12px;
    background: light-dark(#fff, #1a1a1a); color: inherit; outline: none;
  }
  textarea:focus { border-color: light-dark(#999, #555); }
  .row { display: flex; align-items: center; gap: 1rem; margin-top: .75rem; }
  button.primary {
    padding: .55rem 1.4rem; font: inherit; font-weight: 600; cursor: pointer;
    border: none; border-radius: 10px;
    background: light-dark(#1a1a1a, #eee); color: light-dark(#fff, #111);
  }
  button.primary:active { transform: scale(.98); }
  #status { font-size: .9rem; opacity: .7; }
  #status.error { color: #d33; opacity: 1; }
  kbd { font-size: .75rem; opacity: .45; margin-left: auto; }
  #signin { display: grid; gap: 1.25rem; justify-items: center; text-align: center; }
  #signin p { margin: 0; opacity: .7; }
  .alt { font-size: .8rem; opacity: .5; background: none; border: none; color: inherit;
         cursor: pointer; text-decoration: underline; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<main>
  <section id="signin" hidden>
    <h1>recall</h1>
    <p>Your personal memory. Sign in to start capturing.</p>
    <div id="gbtn"></div>
    <button class="alt" id="use-token">use an API token instead</button>
  </section>

  <section id="capture" hidden>
    <h1>recall</h1>
    <textarea id="text" placeholder="What do you want to remember?"></textarea>
    <div class="row">
      <button class="primary" id="save">Save</button>
      <span id="status"></span>
      <kbd>⌘↵</kbd>
    </div>
  </section>
</main>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
const TOKEN_KEY = 'recall_token';
const GOOGLE_CLIENT_ID = '__GOOGLE_CLIENT_ID__';
const signinView = document.getElementById('signin');
const captureView = document.getElementById('capture');
const text = document.getElementById('text');
const status = document.getElementById('status');

function show(view) {
  signinView.hidden = view !== 'signin';
  captureView.hidden = view !== 'capture';
  if (view === 'capture') text.focus();
}

function signOut(message) {
  localStorage.removeItem(TOKEN_KEY);
  show('signin');
  renderGoogleButton();
  if (message) console.warn(message);
}

function renderGoogleButton() {
  if (!window.google?.accounts?.id) {
    setTimeout(renderGoogleButton, 150);
    return;
  }
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: onGoogleCredential,
  });
  google.accounts.id.renderButton(document.getElementById('gbtn'), {
    theme: 'outline', size: 'large', text: 'signin_with', shape: 'pill',
  });
}

async function onGoogleCredential(response) {
  try {
    const res = await fetch('/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential: response.credential }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const { token } = await res.json();
    localStorage.setItem(TOKEN_KEY, token);
    show('capture');
  } catch (err) {
    alert('Sign-in failed, please try again.');
  }
}

document.getElementById('use-token').addEventListener('click', () => {
  const t = (prompt('Paste your recall API token:') || '').trim();
  if (!t) return;
  localStorage.setItem(TOKEN_KEY, t);
  show('capture');
});

async function save() {
  const value = text.value.trim();
  if (!value) return;
  status.className = '';
  status.textContent = 'saving…';
  try {
    const res = await fetch('/entries', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem(TOKEN_KEY),
        'Idempotency-Key': crypto.randomUUID(),
      },
      body: JSON.stringify({ text: value, source: 'web' }),
    });
    if (res.status === 401) {
      signOut('session expired');
      return;
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    text.value = '';
    text.focus();
    status.textContent = 'saved ✓';
    setTimeout(() => { if (status.textContent === 'saved ✓') status.textContent = ''; }, 2500);
  } catch (err) {
    status.className = 'error';
    status.textContent = 'failed — not saved';
  }
}

document.getElementById('save').addEventListener('click', save);
text.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') save();
});

if (localStorage.getItem(TOKEN_KEY)) {
  show('capture');
} else {
  show('signin');
  renderGoogleButton();
}
</script>
</body>
</html>
